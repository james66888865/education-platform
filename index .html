<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>智慧教育平台</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui}
body{background:#f5f7fa;padding:20px}
.login-box{width:350px;margin:100px auto;background:#fff;padding:30px;border-radius:16px;box-shadow:0 2px 12px #0001}
.login-box h1{text-align:center;color:#165DFF;margin-bottom:20px;font-size:22px}
.login-box p{text-align:center;color:#666;margin-bottom:25px;font-size:14px}
.form-item{margin-bottom:15px}
.form-item label{display:block;margin-bottom:6px;font-size:14px;color:#333}
.form-item input{width:100%;padding:12px;border:1px solid #ddd;border-radius:8px;font-size:15px}
button{width:100%;padding:12px;background:#165DFF;color:#fff;border:none;border-radius:8px;font-size:16px;cursor:pointer}
.tip{margin-top:20px;text-align:center;font-size:12px;color:#999}
#main{display:none}
.nav{display:flex;gap:30px;padding:15px;background:#fff;margin-bottom:20px;border-radius:8px}
.nav button{width:auto;padding:6px 12px;background:#eee;color:#333;border:none;border-radius:6px}
.nav button.active{background:#165DFF;color:#fff}
.tab{display:none}
.tab.active{display:block}
.chat-box{height:400px;background:#fff;padding:15px;border-radius:8px;overflow-y:auto;margin-bottom:15px}
.msg{max-width:70%;margin-bottom:10px;padding:10px;border-radius:10px}
.you{background:#165DFF;color:#fff;margin-left:auto}
.ai{background:#e9f2ff;color:#333;margin-right:auto}
.chat-input{display:flex;gap:10px}
.chat-input input{flex:1;padding:12px;border:1px solid #ddd;border-radius:8px}
</style>
</head>
<body>

<!-- 登录页面 -->
<div id="login">
<div class="login-box">
<h1>智慧教育平台</h1>
<p>学生课堂AI助手 | 知识图谱 | 育儿模拟</p>
<div class="form-item">
<label>学号</label>
<input type="text" id="sid" placeholder="请输入学号">
</div>
<div class="form-item">
<label>密码</label>
<input type="password" id="spw" placeholder="请输入密码">
</div>
<button onclick="login()">登录进入平台</button>
<div class="tip">账号：2301630111 &nbsp; 密码：123456</div>
</div>
</div>

<!-- 主页面 -->
<div id="main">
<div class="nav">
<button class="active" onclick="show('ai')">AI问答</button>
<button onclick="show('graph')">知识图谱</button>
<button onclick="show('game')">育儿模拟</button>
<button onclick="backLogin()">退出</button>
</div>

<div id="ai" class="tab active">
<div class="chat-box" id="chat">
<div class="msg ai">你好！我是你的专属AI助手，你可以提问任何问题。</div>
</div>
<div class="chat-input">
<input id="msg" placeholder="输入问题...">
<button onclick="send()">发送</button>
</div>
</div>

<div id="graph" class="tab">
<h3 style="margin-bottom:15px">学科知识图谱</h3>
<p>数学：基础运算 → 代数 → 函数 → 几何</p>
<p>语文：字词 → 阅读 → 文言文 → 写作</p>
<p>英语：词汇 → 语法 → 时态 → 读写</p>
</div>

<div id="game" class="tab">
<h3 style="margin-bottom:15px">育儿模拟小游戏</h3>
<p>场景：孩子放学一直玩手机不写作业</p>
<p>1. 严厉批评没收手机 → 亲子关系变差，孩子叛逆</p>
<p>2. 约定写完作业再玩 → 养成自律习惯</p>
<p>3. 共同制定计划 → 最优成长结局</p>
</div>
</div>

<script>
function login(){
const id=sid.value,pw=spw.value;
if(id=="2301630111"&&pw=="123456"){
login.style.display='none';
main.style.display='block';
}else{alert('账号密码错误')}
}
function backLogin(){main.style.display='none';login.style.display='block'}
function show(t){
document.querySelectorAll('.tab').forEach(e=>e.classList.remove('active'));
document.querySelectorAll('.nav button').forEach(e=>e.classList.remove('active'));
document.getElementById(t).classList.add('active');
event.target.classList.add('active');
}
async function send(){
const txt=msg.value.trim();if(!txt)return;
chat.innerHTML+=`<div class="msg you">${txt}</div>`;msg.value='';
chat.innerHTML+=`<div class="msg ai">正在思考...</div>`;
const res=await fetch('https://api.52vmy.cn/api/chat/gpt?msg='+encodeURIComponent(txt));
const d=await res.json();
chat.lastElementChild.innerHTML=d.data;
}
</script>
</body>
</html>
